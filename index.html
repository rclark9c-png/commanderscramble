<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commander Deck Finder using Moxfield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
    }
    #signature {
      position: fixed;
      bottom: 0;
      left: 0;
      font-size: 1px;
      color: transparent;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4 max-w-4xl mx-auto">
  <h1 class="text-4xl font-bold mb-4 text-center">
    Commander Deck Finder (Moxfield)
  </h1>

  <div class="max-w-sm w-full space-y-4 mb-6">
    <label for="theme" class="block font-semibold mb-1">Theme / Archetype</label>
    <select id="theme" class="w-full p-2 rounded bg-gray-800 text-gray-200">
      <option value="lifegain">Lifegain</option>
      <option value="tokens">Tokens</option>
      <option value="combo">Combo</option>
      <option value="voltron">Voltron</option>
      <option value="reanimator">Reanimator</option>
      <option value="aristocrats">Aristocrats</option>
    </select>

    <label for="power" class="block font-semibold mb-1">Power Bracket</label>
    <select id="power" class="w-full p-2 rounded bg-gray-800 text-gray-200">
      <option value="all">Any</option>
      <option value="1">1 (Casual)</option>
      <option value="2">2 (Moderate)</option>
      <option value="3">3 (Competitive Casual)</option>
      <option value="4">4 (Highly Competitive)</option>
      <option value="5">5 (Top Tier Competitive)</option>
    </select>

    <button id="generateBtn"
      class="w-full p-3 bg-blue-600 hover:bg-blue-700 rounded font-semibold text-white">
      Generate Random Deck
    </button>
  </div>

  <div id="result" class="w-full max-w-2xl bg-gray-900 p-4 rounded hidden">
    <h2 id="commanderName" class="text-2xl font-bold mb-2"></h2>

    <img
      id="commanderImage"
      class="w-full max-w-sm rounded mb-3 hidden"
      alt="Commander image"
    />

    <a id="deckLink"
      href="#"
      target="_blank"
      class="text-blue-400 hover:underline">
      View Deck on Moxfield
    </a>
  </div>

  <p id="signature">RYAN ANDREW CLARK AKA THE LIFE LINK GOD</p>

<script>
  const generateBtn = document.getElementById('generateBtn');
  const resultDiv = document.getElementById('result');
  const commanderNameEl = document.getElementById('commanderName');
  const commanderImageEl = document.getElementById('commanderImage');
  const deckLinkEl = document.getElementById('deckLink');

  const API_BASE = "https://commander-scramble-api.rclark9c.workers.dev";

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  async function fetchRandomDeck(theme, power) {
    resultDiv.classList.add('hidden');

    try {
      const url = `${API_BASE}/?theme=${encodeURIComponent(theme)}`;
      const res = await fetch(url);
      const data = await res.json();

      const decks = data?.decks || [];

      if (!decks.length) {
        alert("No decks found.");
        return;
      }

      let filtered = decks;

      if (power && power !== "all") {
        const p = Number(power);
        filtered = decks.filter(d => Number(d.bracket) === p);
      }

      if (!filtered.length) filtered = decks;

      const deck = pickRandom(filtered);

      const commander =
        deck?.commanders?.[0]?.name ||
        deck?.name ||
        "Commander Unknown";

      commanderNameEl.textContent = commander;

      // ✅ FIXED IMAGE (WORKING SCRYFALL METHOD)
      commanderImageEl.classList.add('hidden');

      if (commander && commander !== "Commander Unknown") {
        try {
          const res = await fetch(
            `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(commander)}`
          );

          const card = await res.json();

          const image =
            card?.image_uris?.normal ||
            card?.image_uris?.large ||
            card?.card_faces?.[0]?.image_uris?.normal;

          if (image) {
            commanderImageEl.src = image;
            commanderImageEl.onload = () => {
              commanderImageEl.classList.remove('hidden');
            };
          }

        } catch (e) {
          console.log("Image fetch failed:", e);
        }
      }

      const deckId = deck?.publicId || deck?.id;

      deckLinkEl.href = `https://www.moxfield.com/decks/${deckId}`;
      deckLinkEl.textContent = "View Deck on Moxfield";

      resultDiv.classList.remove('hidden');

    } catch (e) {
      alert("Error fetching deck: " + e.message);
      resultDiv.classList.add('hidden');
    }
  }

  generateBtn.addEventListener('click', () => {
    const theme = document.getElementById('theme').value;
    const power = document.getElementById('power').value;

    fetchRandomDeck(theme, power);
  });
</script>

</body>
</html>
