<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commander Deck Finder using Moxfield</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #121212; color: #e0e0e0; font-family: Arial, sans-serif;
    }
    #signature {
      position: fixed; bottom: 0; left: 0; font-size: 1px;
      color: transparent; user-select: none; pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 max-w-4xl mx-auto">
  <h1 class="text-4xl font-bold mb-4 text-center">Commander Deck Finder (Moxfield)</h1>

  <div class="max-w-sm w-full space-y-4 mb-6">
    <label for="theme" class="block font-semibold mb-1">Theme / Archetype</label>
    <select id="theme" class="w-full p-2 rounded bg-gray-800 text-gray-200">
      <option value="lifegain">Lifegain</option>
      <option value="tokens">Tokens</option>
      <option value="combo">Combo</option>
      <option value="voltron">Voltron</option>
      <option value="reanimator">Reanimator</option>
      <option value="aristocrats">Aristocrats</option>
    </select>

    <label for="power" class="block font-semibold mb-1">Power Bracket</label>
    <select id="power" class="w-full p-2 rounded bg-gray-800 text-gray-200">
      <option value="all">Any</option>
      <option value="1">1 (Casual)</option>
      <option value="2">2 (Moderate)</option>
      <option value="3">3 (Competitive Casual)</option>
      <option value="4">4 (Highly Competitive)</option>
      <option value="5">5 (Top Tier Competitive)</option>
    </select>

    <button id="generateBtn" class="w-full p-3 bg-blue-600 hover:bg-blue-700 rounded font-semibold text-white">Generate Random Deck</button>
  </div>

  <div id="result" class="w-full max-w-2xl bg-gray-900 p-4 rounded hidden">
    <h2 id="commanderName" class="text-2xl font-bold mb-2"></h2>
    <a id="deckLink" href="#" target="_blank" class="text-blue-400 hover:underline">View Deck on Moxfield</a>
  </div>

  <p id="signature">RYAN ANDREW CLARK AKA THE LIFE LINK GOD</p>

<script>
  const generateBtn = document.getElementById('generateBtn');
  const resultDiv = document.getElementById('result');
  const commanderNameEl = document.getElementById('commanderName');
  const deckLinkEl = document.getElementById('deckLink');

  async function fetchRandomDeck(theme, power) {
    const powerParam = power === 'all' ? '' : `&powerLevel=${power}`;
    const proxyUrl = "https://api.allorigins.win/raw?url=";
    const apiUrl = `https://api.moxfield.com/v2/decks/search?tags=${encodeURIComponent(theme)}${powerParam}&size=50`;
    const url = proxyUrl + encodeURIComponent(apiUrl);

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch decks');
      const data = await res.json();

      if (!data.decks || data.decks.length === 0) {
        alert('No decks found matching your parameters.');
        return;
      }

      const deck = data.decks[Math.floor(Math.random() * data.decks.length)];
      commanderNameEl.textContent = deck.metadata.commanders[0].name || 'Commander Unknown';
      deckLinkEl.href = `https://www.moxfield.com/decks/${deck.id}`;
      deckLinkEl.textContent = 'View Deck on Moxfield';
      resultDiv.classList.remove('hidden');
    } catch (e) {
      alert('Error fetching decks: ' + e.message);
      resultDiv.classList.add('hidden');
    }
  }

  generateBtn.addEventListener('click', () => {
    const theme = document.getElementById('theme').value;
    const power = document.getElementById('power').value;
    fetchRandomDeck(theme, power);
  });
</script>
</body>
</html>
