<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Commander Deck Finder using Moxfield</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
    }

    #signature {
      position: fixed;
      bottom: 0;
      left: 0;
      font-size: 1px;
      color: transparent;
      user-select: none;
      pointer-events: none;
    }

    img {
      max-height: 420px;
      object-fit: contain;
      background: #0a0a0a;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4 max-w-4xl mx-auto">

  <h1 class="text-4xl font-bold mb-4 text-center">
    Commander Deck Finder (Moxfield)
  </h1>

  <div class="max-w-sm w-full space-y-4 mb-6">

    <label class="block font-semibold">Theme / Archetype</label>
    <select id="theme" class="w-full p-2 rounded bg-gray-800 text-gray-200">
      <option value="lifegain">Lifegain</option>
      <option value="tokens">Tokens</option>
      <option value="combo">Combo</option>
      <option value="voltron">Voltron</option>
      <option value="reanimator">Reanimator</option>
      <option value="aristocrats">Aristocrats</option>
    </select>

    <label class="block font-semibold">Power Bracket</label>
    <select id="power" class="w-full p-2 rounded bg-gray-800 text-gray-200">
      <option value="all">Any</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>

    <button id="generateBtn"
      class="w-full p-3 bg-blue-600 hover:bg-blue-700 rounded font-semibold text-white">
      Generate Random Deck
    </button>

  </div>

  <div id="result" class="w-full max-w-2xl bg-gray-900 p-4 rounded hidden">

    <h2 id="commanderName" class="text-2xl font-bold mb-2"></h2>

    <img
      id="commanderImage"
      class="w-full max-w-sm rounded mb-3 hidden"
      alt="Commander image"
    />

    <a id="deckLink"
      href="#"
      target="_blank"
      class="text-blue-400 hover:underline">
      View Deck on Moxfield
    </a>

  </div>

  <p id="signature">RYAN ANDREW CLARK AKA THE LIFE LINK GOD</p>

<script>
const API_BASE = "https://commander-scramble-api.rclark9c.workers.dev";

const generateBtn = document.getElementById('generateBtn');
const resultDiv = document.getElementById('result');
const commanderNameEl = document.getElementById('commanderName');
const commanderImageEl = document.getElementById('commanderImage');
const deckLinkEl = document.getElementById('deckLink');

// prevents repeats
let recentDecks = [];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function pickNonRepeating(decks) {
  const filtered = decks.filter(d => !recentDecks.includes(d.id || d.publicId));
  const pool = filtered.length ? filtered : decks;

  const deck = pool[Math.floor(Math.random() * pool.length)];

  recentDecks.push(deck.id || deck.publicId);
  if (recentDecks.length > 8) recentDecks.shift();

  return deck;
}

async function loadCommanderImage(name) {
  commanderImageEl.classList.add('hidden');
  commanderImageEl.removeAttribute('src');

  if (!name || name === "Commander Unknown") return;

  const q = encodeURIComponent(name);

  try {
    let res = await fetch(`https://api.scryfall.com/cards/named?exact=${q}`);
    let card = await res.json();

    let img =
      card?.image_uris?.normal ||
      card?.card_faces?.[0]?.image_uris?.normal;

    if (!img) throw new Error();

    commanderImageEl.src = img;
    commanderImageEl.classList.remove('hidden');

  } catch {
    try {
      let res = await fetch(`https://api.scryfall.com/cards/search?q=${q}&unique=cards`);
      let data = await res.json();

      let card = data?.data?.[0];

      let img =
        card?.image_uris?.normal ||
        card?.card_faces?.[0]?.image_uris?.normal;

      if (img) {
        commanderImageEl.src = img;
        commanderImageEl.classList.remove('hidden');
      }
    } catch {}
  }
}

async function fetchRandomDeck(theme, power) {
  resultDiv.classList.add('hidden');

  try {
    const url = `${API_BASE}/?theme=${encodeURIComponent(theme)}`;
    const res = await fetch(url);
    const data = await res.json();

    let decks = data?.decks || [];
    if (!decks.length) return alert("No decks found.");

    // filter power bracket
    if (power !== "all") {
      decks = decks.filter(d => Number(d.bracket) === Number(power));
    }

    if (!decks.length) return alert("No decks in this bracket.");

    // shuffle for randomness
    decks = shuffle(decks);

    // anti-repeat pick
    const deck = pickNonRepeating(decks);

    const commander =
      deck?.commanders?.[0]?.name ||
      deck?.name ||
      "Commander Unknown";

    commanderNameEl.textContent = commander;

    const deckId = deck?.publicId || deck?.id;
    deckLinkEl.href = `https://www.moxfield.com/decks/${deckId}`;

    await loadCommanderImage(commander);

    resultDiv.classList.remove('hidden');

  } catch (e) {
    alert("Error: " + e.message);
  }
}

generateBtn.addEventListener('click', () => {
  const theme = document.getElementById('theme').value;
  const power = document.getElementById('power').value;
  fetchRandomDeck(theme, power);
});
</script>

</body>
</html>
